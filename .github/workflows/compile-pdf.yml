name: Compile Typst PDF

on:
  push:
    branches: [main]
    paths:
      - "**.typ"
      - "assets/**"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-jetbrains-mono

          git clone --depth=1 https://gitlab.com/bonjour-monde/fonderie/syne-typeface.git /tmp/syne
          mkdir -p ~/.local/share/fonts
          cp /tmp/syne/fonts/ttf/*.ttf ~/.local/share/fonts/

      - name: Compile
        run: typst compile main.typ ICCBD-notes.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update compiled PDF [skip ci]"
          file_pattern: ICCBD-notes.pdf
