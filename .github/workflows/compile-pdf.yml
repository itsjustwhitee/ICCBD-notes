name: Compile Typst PDF

on:
  push:
    branches: [main]
    paths:
      - "**.typ"
      - "assets/**"
      - "fonts/**"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Compile
        run: typst compile main.typ ICCBD-notes.pdf --font-path ./fonts

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update compiled PDF [skip ci]"
          file_pattern: ICCBD-notes.pdf
