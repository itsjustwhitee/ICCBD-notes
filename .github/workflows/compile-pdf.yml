name: Compile Typst PDF

on:
  push:
    branches: [main]
    paths:
      - "**.typ"
      - "assets/**"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          # JetBrains Mono — packaged in Ubuntu repos
          sudo apt-get install -y fonts-jetbrains-mono

          # Syne — variable font from google/fonts (covers all weights)
          mkdir -p ~/.local/share/fonts
          curl -fsSL \
            "https://github.com/google/fonts/raw/main/ofl/syne/Syne%5Bwght%5D.ttf" \
            -o ~/.local/share/fonts/Syne.ttf

      - name: Compile
        run: typst compile main.typ ICCBD-notes.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update compiled PDF [skip ci]"
          file_pattern: ICCBD-notes.pdf
