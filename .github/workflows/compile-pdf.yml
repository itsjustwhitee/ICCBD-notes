name: Compile Typst PDF

on:
  push:
    branches: [main]
    paths:
      - "**.typ"
      - "assets/**"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          sudo apt-get install -y fonts-jetbrains-mono

          mkdir -p ~/.local/share/fonts
          for weight in 400 500 600 700 800; do
            curl -fsSL \
              "https://cdn.jsdelivr.net/npm/@fontsource/syne/files/syne-latin-${weight}-normal.woff2" \
              -o ~/.local/share/fonts/Syne-${weight}.woff2
          done

      - name: Compile
        run: typst compile main.typ ICCBD-notes.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update compiled PDF [skip ci]"
          file_pattern: ICCBD-notes.pdf
