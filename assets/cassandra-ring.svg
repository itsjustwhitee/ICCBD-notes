<svg viewBox="0 0 580 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="10">

  <!-- Title -->
  <text x="290" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Cassandra Ring Architecture</text>

  <!-- Ring circle -->
  <circle cx="200" cy="190" r="120" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Nodes on ring at 0°, 45°, 90°, 135°, 180°, 225°, 270°, 315° -->
  <!-- N0 at top (270° = -90°) -->
  <!-- N16 at 315° = top-right -->
  <!-- N32 at 0° = right -->
  <!-- N48 at 45° = bottom-right -->
  <!-- N64 at 90° = bottom -->
  <!-- N80 at 135° = bottom-left -->
  <!-- N96 at 180° = left -->
  <!-- N112 at 225° = top-left -->

  <!-- cx = 200 + 120*cos(angle), cy = 190 + 120*sin(angle) -->
  <!-- angle in SVG = clockwise from 3 o'clock -->
  <!-- We map: N0=top => angle=-90°, N16=top-right => -45°, N32=right => 0°, etc. -->

  <!-- N0 (top): cx=200, cy=70 -->
  <circle cx="200" cy="70" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="200" y="74" text-anchor="middle" font-weight="bold" fill="#155724" font-size="9">N0</text>
  <text x="200" y="85" text-anchor="middle" fill="#155724" font-size="8">tok 0</text>

  <!-- N16 (top-right): cx≈285, cy≈105 -->
  <circle cx="285" cy="105" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="285" y="109" text-anchor="middle" font-weight="bold" fill="#155724" font-size="9">N16</text>
  <text x="285" y="120" text-anchor="middle" fill="#155724" font-size="8">tok 16</text>

  <!-- N32 (right): cx=320, cy=190 -->
  <circle cx="320" cy="190" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="320" y="194" text-anchor="middle" font-weight="bold" fill="#155724" font-size="9">N32</text>
  <text x="320" y="205" text-anchor="middle" fill="#155724" font-size="8">tok 32</text>

  <!-- N48 (bottom-right): cx≈285, cy≈275 -->
  <circle cx="285" cy="275" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="285" y="279" text-anchor="middle" font-weight="bold" fill="#155724" font-size="9">N48</text>
  <text x="285" y="290" text-anchor="middle" fill="#155724" font-size="8">tok 48</text>

  <!-- N64 (bottom): cx=200, cy=310 -->
  <circle cx="200" cy="310" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="200" y="314" text-anchor="middle" font-weight="bold" fill="#155724" font-size="9">N64</text>
  <text x="200" y="325" text-anchor="middle" fill="#155724" font-size="8">tok 64</text>

  <!-- N80 (bottom-left): cx≈115, cy≈275 -->
  <circle cx="115" cy="275" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="115" y="279" text-anchor="middle" font-weight="bold" fill="#155724" font-size="9">N80</text>
  <text x="115" y="290" text-anchor="middle" fill="#155724" font-size="8">tok 80</text>

  <!-- N96 (left): cx=80, cy=190 -->
  <circle cx="80" cy="190" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="80" y="194" text-anchor="middle" font-weight="bold" fill="#155724" font-size="9">N96</text>
  <text x="80" y="205" text-anchor="middle" fill="#155724" font-size="8">tok 96</text>

  <!-- N112 (top-left): cx≈115, cy≈105 -->
  <circle cx="115" cy="105" r="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="115" y="109" text-anchor="middle" font-weight="bold" fill="#155724" font-size="9">N112</text>
  <text x="115" y="120" text-anchor="middle" fill="#155724" font-size="8">tok 112</text>

  <!-- Key K13 marker (between N0 and N16, closer to N0) -->
  <!-- angle roughly -67° from center: cx ≈ 200+120*cos(-67°)=200+47=247, cy≈190+120*sin(-67°)=190-110=80 -->
  <circle cx="248" cy="88" r="8" fill="#ffc107" stroke="#e65c00" stroke-width="1.5"/>
  <text x="248" y="92" text-anchor="middle" font-size="8" font-weight="bold" fill="#7d3200">K13</text>

  <!-- Arrow from K13 to N16 (primary replica) -->
  <line x1="256" y1="88" x2="270" y2="100" stroke="#e65c00" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#aro)"/>
  <text x="265" y="85" font-size="8" fill="#e65c00">primary</text>

  <!-- Replica arrows from N16 clockwise: to N32, N48 -->
  <line x1="300" y1="115" x2="307" y2="170" stroke="#4a90d9" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arb)"/>
  <text x="315" y="148" font-size="8" fill="#4a90d9">replica 2</text>
  <line x1="300" y1="258" x2="300" y2="242" stroke="#4a90d9" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arb)"/>
  <text x="308" y="245" font-size="8" fill="#4a90d9">replica 3</text>

  <!-- Arrow ring direction indicator -->
  <path d="M 215 72 Q 260 50 285 88" fill="none" stroke="#888" stroke-width="1" marker-end="url(#argray)"/>
  <text x="255" y="52" font-size="8" fill="#888">clockwise</text>

  <!-- Legend panel (right side) -->
  <rect x="350" y="28" width="220" height="310" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="460" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Cassandra Ring</text>

  <circle cx="372" cy="68" r="8" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="388" y="72" font-size="9" fill="#333">Node (token owner)</text>

  <circle cx="372" cy="90" r="8" fill="#ffc107" stroke="#e65c00" stroke-width="1.5"/>
  <text x="388" y="94" font-size="9" fill="#333">Key K (hashed)</text>

  <line x1="362" y1="112" x2="382" y2="112" stroke="#e65c00" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#aro)"/>
  <text x="388" y="116" font-size="9" fill="#333">Primary replica assignment</text>

  <line x1="362" y1="134" x2="382" y2="134" stroke="#4a90d9" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arb)"/>
  <text x="388" y="138" font-size="9" fill="#333">Backup replica (clockwise)</text>

  <!-- Key rules -->
  <text x="360" y="162" font-size="9" font-weight="bold" fill="#333">Key Rules:</text>
  <text x="360" y="178" font-size="9" fill="#333">- K maps to first node ≥ hash(K)</text>
  <text x="360" y="194" font-size="9" fill="#333">- RF replicas placed clockwise</text>
  <text x="360" y="210" font-size="9" fill="#333">- SimpleStrategy or</text>
  <text x="360" y="224" font-size="9" fill="#333">  NetworkTopologyStrategy</text>
  <text x="360" y="240" font-size="9" fill="#333">- Coordinator routes write/read</text>
  <text x="360" y="256" font-size="9" fill="#333">- Gossip for membership</text>
  <text x="360" y="272" font-size="9" fill="#333">- Hinted Handoff if replica down</text>

  <!-- Write path note -->
  <rect x="358" y="288" width="202" height="42" rx="4" fill="#fff3cd" stroke="#f0ad4e" stroke-width="0.8"/>
  <text x="459" y="303" text-anchor="middle" font-size="9" font-weight="bold" fill="#7d5a00">Write: commit log → Memtable</text>
  <text x="459" y="316" text-anchor="middle" font-size="9" fill="#7d5a00">Flush to SSTable (immutable)</text>
  <text x="459" y="329" text-anchor="middle" font-size="9" fill="#7d5a00">Compaction merges SSTables</text>

  <defs>
    <marker id="aro" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e65c00"/>
    </marker>
    <marker id="arb" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="argray" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
