<svg viewBox="0 0 500 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">

  <!-- Title -->
  <text x="250" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Chord DHT Ring</text>

  <!-- Ring circle -->
  <circle cx="250" cy="220" r="140" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ID space arc labels -->
  <text x="250" y="66" text-anchor="middle" font-size="9" fill="#999">0 / 2^160</text>

  <!-- Nodes on ring (8 nodes at various positions) -->
  <!-- N0 at top -->
  <circle cx="250" cy="80" r="16" fill="#cce5ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="250" y="85" text-anchor="middle" font-weight="bold" fill="#1a4a80">N0</text>

  <!-- N14 at ~52deg -->
  <circle cx="361" cy="106" r="16" fill="#cce5ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="361" y="111" text-anchor="middle" font-weight="bold" fill="#1a4a80">N14</text>

  <!-- N21 at ~90deg (right) -->
  <circle cx="390" cy="220" r="16" fill="#cce5ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="390" y="225" text-anchor="middle" font-weight="bold" fill="#1a4a80">N21</text>

  <!-- N32 at ~135deg -->
  <circle cx="349" cy="319" r="16" fill="#cce5ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="349" y="324" text-anchor="middle" font-weight="bold" fill="#1a4a80">N32</text>

  <!-- N42 at bottom -->
  <circle cx="250" cy="360" r="16" fill="#cce5ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="250" y="365" text-anchor="middle" font-weight="bold" fill="#1a4a80">N42</text>

  <!-- N51 at ~225deg -->
  <circle cx="151" cy="319" r="16" fill="#cce5ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="151" y="324" text-anchor="middle" font-weight="bold" fill="#1a4a80">N51</text>

  <!-- N63 at left -->
  <circle cx="110" cy="220" r="16" fill="#cce5ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="110" y="225" text-anchor="middle" font-weight="bold" fill="#1a4a80">N63</text>

  <!-- N7 at ~315deg -->
  <circle cx="139" cy="106" r="16" fill="#cce5ff" stroke="#4a90d9" stroke-width="2"/>
  <text x="139" y="111" text-anchor="middle" font-weight="bold" fill="#1a4a80">N7</text>

  <!-- Key K18 marker (stored at successor N21) -->
  <circle cx="392" cy="160" r="10" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="392" y="164" text-anchor="middle" font-size="9" font-weight="bold" fill="#7d5a00">K18</text>
  <!-- Arrow K18 -> N21 -->
  <line x1="391" y1="170" x2="389" y2="204" stroke="#f0ad4e" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrok)"/>
  <text x="410" y="188" font-size="9" fill="#a06000">successor</text>

  <!-- Finger table arrows from N0 (showing shortcuts) -->
  <text x="250" y="45" text-anchor="middle" font-size="9" fill="#4a90d9">finger[1]: N7</text>
  <!-- Arrow N0->N7 -->
  <line x1="237" y1="87" x2="153" y2="100" stroke="#4a90d9" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrf)"/>
  <!-- Arrow N0->N21 (finger[4]) -->
  <line x1="263" y1="87" x2="374" y2="208" stroke="#2196f3" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrf)"/>

  <!-- Clockwise label -->
  <text x="250" y="220" text-anchor="middle" font-size="10" fill="#888" font-style="italic">clockwise</text>
  <text x="250" y="235" text-anchor="middle" font-size="10" fill="#888" font-style="italic">successor</text>

  <!-- Legend -->
  <rect x="15" y="380" width="12" height="12" fill="#cce5ff" stroke="#4a90d9" stroke-width="1"/>
  <text x="32" y="391" font-size="10" fill="#555">Node (hashed ID)</text>
  <rect x="140" y="380" width="12" height="12" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1"/>
  <text x="157" y="391" font-size="10" fill="#555">Key (stored at successor)</text>
  <line x1="310" y1="386" x2="340" y2="386" stroke="#4a90d9" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrf)"/>
  <text x="345" y="391" font-size="10" fill="#555">Finger shortcut</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrf" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrok" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f0ad4e"/>
    </marker>
  </defs>
</svg>
