<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="10">

  <!-- Title -->
  <text x="320" y="16" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">MapReduce / Spark Data Flow</text>

  <!-- Phase labels -->
  <text x="60"  y="34" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">INPUT</text>
  <text x="185" y="34" text-anchor="middle" font-size="10" font-weight="bold" fill="#155724">MAP</text>
  <text x="320" y="34" text-anchor="middle" font-size="10" font-weight="bold" fill="#7d2e00">SHUFFLE &amp; SORT</text>
  <text x="455" y="34" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a80">REDUCE</text>
  <text x="580" y="34" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">OUTPUT</text>

  <!-- INPUT splits -->
  <rect x="20" y="50" width="80" height="22" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"/>
  <text x="60" y="65" text-anchor="middle" font-size="9" fill="#555">Split 1 (64MB)</text>
  <rect x="20" y="82" width="80" height="22" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"/>
  <text x="60" y="97" text-anchor="middle" font-size="9" fill="#555">Split 2 (64MB)</text>
  <rect x="20" y="114" width="80" height="22" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"/>
  <text x="60" y="129" text-anchor="middle" font-size="9" fill="#555">Split 3 (64MB)</text>
  <rect x="20" y="146" width="80" height="22" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"/>
  <text x="60" y="161" text-anchor="middle" font-size="9" fill="#555">Split 4 (64MB)</text>

  <!-- Arrows input -> map -->
  <line x1="100" y1="61" x2="150" y2="65" stroke="#adb5bd" stroke-width="1" marker-end="url(#agray)"/>
  <line x1="100" y1="93" x2="150" y2="88" stroke="#adb5bd" stroke-width="1" marker-end="url(#agray)"/>
  <line x1="100" y1="125" x2="150" y2="120" stroke="#adb5bd" stroke-width="1" marker-end="url(#agray)"/>
  <line x1="100" y1="157" x2="150" y2="152" stroke="#adb5bd" stroke-width="1" marker-end="url(#agray)"/>

  <!-- MAP tasks -->
  <rect x="150" y="50" width="75" height="22" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="187" y="65" text-anchor="middle" font-size="9" font-weight="bold" fill="#155724">Map Task 1</text>
  <rect x="150" y="80" width="75" height="22" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="187" y="95" text-anchor="middle" font-size="9" font-weight="bold" fill="#155724">Map Task 2</text>
  <rect x="150" y="110" width="75" height="22" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="187" y="125" text-anchor="middle" font-size="9" font-weight="bold" fill="#155724">Map Task 3</text>
  <rect x="150" y="140" width="75" height="22" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="187" y="155" text-anchor="middle" font-size="9" font-weight="bold" fill="#155724">Map Task 4</text>

  <!-- Intermediate kv pairs -->
  <text x="187" y="72" text-anchor="middle" font-size="7" fill="#155724">(k,v) pairs</text>
  <text x="187" y="102" text-anchor="middle" font-size="7" fill="#155724">(k,v) pairs</text>
  <text x="187" y="132" text-anchor="middle" font-size="7" fill="#155724">(k,v) pairs</text>
  <text x="187" y="162" text-anchor="middle" font-size="7" fill="#155724">(k,v) pairs</text>

  <!-- SHUFFLE & SORT box (barrier) -->
  <rect x="255" y="42" width="130" height="140" rx="5" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="320" y="57" text-anchor="middle" font-size="9" fill="#7d5a00">Group by key</text>
  <text x="320" y="70" text-anchor="middle" font-size="9" fill="#7d5a00">Sort &amp; partition</text>
  <!-- Key groups -->
  <rect x="265" y="78" width="110" height="16" rx="3" fill="#ffe0cc" stroke="#e8721a" stroke-width="0.8"/>
  <text x="320" y="90" text-anchor="middle" font-size="8" fill="#7d2e00">key="Everyone": [1,1]</text>
  <rect x="265" y="100" width="110" height="16" rx="3" fill="#ffe0cc" stroke="#e8721a" stroke-width="0.8"/>
  <text x="320" y="112" text-anchor="middle" font-size="8" fill="#7d2e00">key="Hello": [1]</text>
  <rect x="265" y="122" width="110" height="16" rx="3" fill="#ffe0cc" stroke="#e8721a" stroke-width="0.8"/>
  <text x="320" y="134" text-anchor="middle" font-size="8" fill="#7d2e00">key="Welcome": [1]</text>
  <text x="320" y="172" text-anchor="middle" font-size="8" fill="#f0ad4e" font-style="italic">⚠ BARRIER: all maps</text>
  <text x="320" y="183" text-anchor="middle" font-size="8" fill="#f0ad4e" font-style="italic">must finish first</text>

  <!-- Arrows map -> shuffle -->
  <line x1="225" y1="61" x2="255" y2="86" stroke="#28a745" stroke-width="1" marker-end="url(#agreen)"/>
  <line x1="225" y1="91" x2="255" y2="98" stroke="#28a745" stroke-width="1" marker-end="url(#agreen)"/>
  <line x1="225" y1="121" x2="255" y2="118" stroke="#28a745" stroke-width="1" marker-end="url(#agreen)"/>
  <line x1="225" y1="151" x2="255" y2="138" stroke="#28a745" stroke-width="1" marker-end="url(#agreen)"/>

  <!-- Arrows shuffle -> reduce -->
  <line x1="385" y1="86" x2="415" y2="68" stroke="#e8721a" stroke-width="1" marker-end="url(#aorange)"/>
  <line x1="385" y1="108" x2="415" y2="108" stroke="#e8721a" stroke-width="1" marker-end="url(#aorange)"/>
  <line x1="385" y1="130" x2="415" y2="148" stroke="#e8721a" stroke-width="1" marker-end="url(#aorange)"/>

  <!-- REDUCE tasks -->
  <rect x="415" y="50" width="80" height="26" rx="3" fill="#cce5ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="455" y="67" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a4a80">Reduce Task 1</text>
  <rect x="415" y="95" width="80" height="26" rx="3" fill="#cce5ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="455" y="112" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a4a80">Reduce Task 2</text>
  <rect x="415" y="140" width="80" height="26" rx="3" fill="#cce5ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="455" y="157" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a4a80">Reduce Task 3</text>

  <!-- Arrows reduce -> output -->
  <line x1="495" y1="63" x2="540" y2="63" stroke="#4a90d9" stroke-width="1" marker-end="url(#ablue)"/>
  <line x1="495" y1="108" x2="540" y2="108" stroke="#4a90d9" stroke-width="1" marker-end="url(#ablue)"/>
  <line x1="495" y1="153" x2="540" y2="153" stroke="#4a90d9" stroke-width="1" marker-end="url(#ablue)"/>

  <!-- OUTPUT -->
  <rect x="540" y="50" width="80" height="26" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"/>
  <text x="580" y="67" text-anchor="middle" font-size="9" fill="#555">Out file 1</text>
  <rect x="540" y="95" width="80" height="26" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"/>
  <text x="580" y="112" text-anchor="middle" font-size="9" fill="#555">Out file 2</text>
  <rect x="540" y="140" width="80" height="26" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-width="1"/>
  <text x="580" y="157" text-anchor="middle" font-size="9" fill="#555">Out file 3</text>

  <!-- Spark RDD annotation -->
  <rect x="20" y="200" width="600" height="68" rx="5" fill="#e8f4ff" stroke="#4a90d9" stroke-width="1"/>
  <text x="320" y="216" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a4a80">Spark RDD Advantage over MapReduce</text>
  <text x="320" y="232" text-anchor="middle" font-size="9" fill="#333">MapReduce: each stage reads from HDFS and writes back (disk I/O bottleneck)</text>
  <text x="320" y="248" text-anchor="middle" font-size="9" fill="#333">Spark: RDDs kept in memory across stages → 10–100× faster for iterative algorithms</text>
  <text x="320" y="264" text-anchor="middle" font-size="9" fill="#4a90d9">Fault tolerance via lineage (recompute lost partitions) rather than replication</text>

  <defs>
    <marker id="agray" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#adb5bd"/>
    </marker>
    <marker id="agreen" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#28a745"/>
    </marker>
    <marker id="aorange" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#e8721a"/>
    </marker>
    <marker id="ablue" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#4a90d9"/>
    </marker>
  </defs>
</svg>
